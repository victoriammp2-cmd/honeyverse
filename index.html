<style>
html,body{margin:0;padding:0;height:100%;background:#1a1612;font-family:Inter,system-ui,sans-serif;-webkit-font-smoothing:antialiased;color:#262114}
:root{
  --cream:#FDF8EF;--cream2:#F8F7F0;--cream3:#F4F2EB;
  --ink:#262114;--inks:#4a4231;
  --pink:#FEB8D4;--pinksub:rgba(254,184,212,0.28);--pinkd:#BF7291;
  --honey:#F4D685;--honeyd:#D9B24A;
  --sage:#E6E0D1;--div:rgba(38,33,20,0.10);
  --sidebar:#17110a;--sw:228px;
}
*{box-sizing:border-box}
button{font:inherit;color:inherit;background:none;border:0;padding:0;cursor:pointer;-webkit-tap-highlight-color:transparent}
.wm{font-family:Fraunces,Georgia,serif;font-weight:500;font-style:italic;letter-spacing:-.025em}
.sr{font-family:Fraunces,Georgia,serif}
.hk{font-family:'Hanken Grotesk',Inter,sans-serif}
.ns::-webkit-scrollbar{display:none}.ns{scrollbar-width:none}

/* ── LAYOUT ── */
.app-shell{display:flex;min-height:100vh;background:var(--cream)}
.sidebar{width:var(--sw);min-height:100vh;background:var(--sidebar);display:flex;flex-direction:column;position:fixed;top:0;left:0;z-index:50;transition:transform .2s}
.main{flex:1;margin-left:var(--sw);min-height:100vh;background:var(--cream);overflow-x:hidden}
.mob-bar{display:none!important}
.feed-card{background:#fff;border-radius:14px;padding:16px;border:.5px solid rgba(38,33,20,.07);box-shadow:0 1px 3px rgba(38,33,20,.04),0 3px 10px rgba(38,33,20,.04)}
.rail{display:none}

@media(max-width:767px){
  .sidebar{transform:translateX(-100%)}
  .main{margin-left:0;padding-bottom:72px}
  .mob-bar{display:flex!important}
  .desk-back{display:none!important}
}
@media(min-width:1140px){.rail{display:block}}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes fadein{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
.fadein{animation:fadein .25s ease both}
</style>
</head>

<script type="text/babel">
// ─────────────────────────────────────────────────────────────
// VISUAL ATOMS
// ─────────────────────────────────────────────────────────────
function motifPath(m) {
  if (m==='waves')    return <g stroke="rgba(255,255,255,0.22)" strokeWidth="1.3" fill="none"><path d="M-10 36 Q10 22 30 36T70 36T110 36"/><path d="M-10 58 Q10 44 30 58T70 58T110 58"/><path d="M-10 80 Q10 66 30 80T70 80T110 80"/><path d="M-10 102 Q10 88 30 102T70 102T110 102"/></g>;
  if (m==='stars')    return <g fill="rgba(255,255,255,0.75)"><circle cx="16" cy="18" r=".8"/><circle cx="74" cy="29" r="1.1"/><circle cx="42" cy="57" r=".7"/><circle cx="86" cy="74" r="1"/><circle cx="26" cy="84" r=".8"/><circle cx="61" cy="102" r=".7"/><circle cx="89" cy="115" r=".9"/><circle cx="10" cy="122" r=".6"/><circle cx="50" cy="136" r=".8"/></g>;
  if (m==='botanical')return <g fill="rgba(255,255,255,0.18)"><ellipse cx="20" cy="42" rx="8" ry="15" transform="rotate(-30 20 42)"/><ellipse cx="76" cy="82" rx="13" ry="21" transform="rotate(20 76 82)"/><ellipse cx="60" cy="20" rx="6" ry="11" transform="rotate(14 60 20)"/><ellipse cx="30" cy="114" rx="9" ry="16" transform="rotate(-20 30 114)"/></g>;
  if (m==='grid')     return <g stroke="rgba(255,255,255,0.1)" strokeWidth=".8"><path d="M0 28h100M0 56h100M0 84h100M0 112h100M0 140h100M25 0v142M50 0v142M75 0v142"/></g>;
  return null;
}

function Cover({fic, size=88, radius=8, mo}) {
  const g = fic?.grad || {a:'#3a3028',b:'#6a5848'};
  const m = mo || fic?.motif || 'waves';
  const h = Math.round(size*1.42);
  const gid = 'cg'+(fic?.id||'x')+m+size;
  return (
    <div style={{width:size,height:h,borderRadius:radius,overflow:'hidden',position:'relative',flexShrink:0,
      boxShadow:'0 1px 3px rgba(38,33,20,.14),0 4px 16px rgba(38,33,20,.1),inset -1px 0 0 rgba(0,0,0,.15)'}}>
      <svg viewBox="0 0 100 142" width="100%" height="100%" preserveAspectRatio="none">
        <defs>
          <linearGradient id={gid} x1="0" y1="0" x2="1" y2="1">
            <stop offset="0" stopColor={g.a}/><stop offset="1" stopColor={g.b}/>
          </linearGradient>
        </defs>
        <rect width="100" height="142" fill={`url(#${gid})`}/>
        {motifPath(m)}
        <rect x="0" y="0" width="4" height="142" fill="rgba(0,0,0,.28)"/>
      </svg>
      <div style={{position:'absolute',inset:0,padding:`${Math.max(6,size*.08)}px ${Math.max(7,size*.1)}px`,
        display:'flex',flexDirection:'column',justifyContent:'flex-end',color:'#fff'}}>
        <div style={{fontFamily:'Fraunces,Georgia,serif',fontWeight:600,fontStyle:'italic',
          fontSize:Math.max(9,Math.round(size*.14)),lineHeight:1.1,textShadow:'0 1px 3px rgba(0,0,0,.3)'}}>{fic?.title}</div>
        <div style={{fontFamily:'Hanken Grotesk,sans-serif',fontSize:Math.max(8,Math.round(size*.09)),opacity:.8,marginTop:2}}>{fic?.author}</div>
      </div>
    </div>
  );
}

function Av({user, size=32}) {
  const u = typeof user==='string' ? USERS[user] : user;
  const c = {honey:'#F4D685',pink:'#FEB8D4',sage:'#E6E0D1'};
  return (
    <div style={{width:size,height:size,borderRadius:size/2,background:c[u?.av||'sage'],
      display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0,
      fontFamily:'Fraunces,Georgia,serif',fontWeight:600,fontStyle:'italic',
      fontSize:Math.round(size*.42),color:'#262114',letterSpacing:'-.02em'}}>
      {(u?.name||'?').slice(0,2)}
    </div>
  );
}

function RChip({r,n,sm}) {
  const d = typeof r==='string' ? RBY[r] : r;
  if (!d) return null;
  const hc = {pink:{bg:'rgba(254,184,212,.28)',fg:'#8a3d5a'},honey:{bg:'rgba(244,214,133,.38)',fg:'#7a5a15'},sage:{bg:'rgba(230,224,209,.7)',fg:'#4a4231'}};
  const h = hc[d.hue];
  return (
    <span style={{display:'inline-flex',alignItems:'center',gap:5,
      padding:sm?'3px 8px':'6px 12px',borderRadius:100,background:h.bg,color:h.fg,
      fontFamily:'Inter',fontWeight:600,fontSize:sm?11:13,letterSpacing:'-.01em',whiteSpace:'nowrap'}}>
      <span>{d.glyph}</span>{d.label}{n!=null&&<span style={{opacity:.6,fontWeight:500}}>{n}</span>}
    </span>
  );
}

function TagPill({children,tone='d'}) {
  const t = {
    d:{bg:'transparent',bd:'rgba(38,33,20,.15)',fg:'#262114'},
    s:{bg:'#262114',bd:'#262114',fg:'#FDF8EF'},
    h:{bg:'rgba(244,214,133,.45)',bd:'rgba(217,178,74,.4)',fg:'#5a4318'},
    p:{bg:'rgba(254,184,212,.35)',bd:'rgba(191,114,145,.3)',fg:'#8a3d5a'},
  }[tone];
  return (
    <span style={{display:'inline-flex',padding:'3px 9px',borderRadius:100,background:t.bg,
      border:`0.5px solid ${t.bd}`,color:t.fg,fontFamily:'Hanken Grotesk,Inter',fontSize:11.5,fontWeight:500,whiteSpace:'nowrap'}}>
      {children}
    </span>
  );
}

function SHead({title,sub,action}) {
  return (
    <div style={{display:'flex',alignItems:'flex-end',justifyContent:'space-between',marginBottom:14}}>
      <div>
        <div className="sr" style={{fontWeight:600,fontStyle:'italic',fontSize:21,color:'#262114',letterSpacing:'-.02em',lineHeight:1}}>{title}</div>
        {sub&&<div className="hk" style={{fontSize:12.5,color:'#4a4231',marginTop:4}}>{sub}</div>}
      </div>
      {action}
    </div>
  );
}

Object.assign(window,{Cover,Av,RChip,TagPill,SHead,motifPath});
</script>

<script type="text/babel">

function SetupScreen({onDone}) {
  const [step,setStep] = React.useState(1);
  const [username,setUsername] = React.useState('');
  const [fandoms,setFandoms] = React.useState([]);
  const toggle = f=>setFandoms(p=>p.includes(f)?p.filter(x=>x!==f):[...p,f]);
  return (
    <div style={{minHeight:'100vh',background:'#FDF8EF',display:'flex',alignItems:'center',justifyContent:'center',padding:24}}>
      <div style={{width:'100%',maxWidth:440}} className="fadein">

          {[1,2].map(n=><div key={n} style={{height:4,width:44,borderRadius:2,
            background:n<=step?'#262114':'rgba(38,33,20,.15)',transition:'background .2s'}}/>)}
        </div>
        {step===1 && (<>
          <div className="sr" style={{fontStyle:'italic',fontWeight:600,fontSize:30,color:'#262114',letterSpacing:'-.02em'}}>
            What should we call you?
          </div>

          </div>
          <div style={{position:'relative'}}>
            <span style={{position:'absolute',left:16,top:'50%',transform:'translateY(-50%)',
              fontFamily:'Inter',fontSize:15,color:'rgba(38,33,20,.38)',pointerEvents:'none'}}>@</span>
            <input value={username} onChange={e=>setUsername(e.target.value.toLowerCase().replace(/[^a-z0-9_]/g,''))}
              placeholder="yourhandle" maxLength={24} autoFocus
              style={{width:'100%',padding:'14px 16px 14px 32px',borderRadius:14,fontSize:16,
                border:`1.5px solid ${username.length>1?'#262114':'rgba(38,33,20,.2)'}`,
                fontFamily:'Inter',color:'#262114',outline:'none',background:'rgba(255,255,255,.7)',transition:'border .15s'}}/>
          </div>
          <div className="hk" style={{fontSize:11.5,color:'rgba(38,33,20,.4)',marginTop:8}}>Letters, numbers, underscores only.</div>
          <button onClick={()=>username.length>1&&setStep(2)} style={{
            width:'100%',marginTop:28,padding:'15px 20px',borderRadius:14,
            background:username.length>1?'#262114':'rgba(38,33,20,.12)',
            color:username.length>1?'#FDF8EF':'rgba(38,33,20,.35)',
            fontFamily:'Inter',fontWeight:600,fontSize:15,transition:'all .15s'}}>
            Next \u2192
          </button>
        </>)}
        {step===2 && (<>
          <div className="sr" style={{fontStyle:'italic',fontWeight:600,fontSize:30,color:'#262114',letterSpacing:'-.02em'}}>
            What worlds do you read in?
          </div>
          <div className="hk" style={{fontSize:14,color:'#4a4231',marginTop:8,marginBottom:24,lineHeight:1.55}}>
            Pick a few fandoms to personalise your Discover feed.
          </div>
          <div style={{display:'flex',flexWrap:'wrap',gap:9}}>
            {FANDOMS.map(f=>{
              const on=fandoms.includes(f);
              return (
                <button key={f} onClick={()=>toggle(f)} style={{
                  padding:'9px 16px',borderRadius:100,fontSize:13.5,fontFamily:'Inter',fontWeight:on?600:500,color:'#262114',

          <div style={{display:'flex',gap:10,marginTop:32}}>
            <button onClick={()=>setStep(1)} style={{padding:'13px 18px',borderRadius:14,background:'transparent',
              border:'1px solid rgba(38,33,20,.2)',fontFamily:'Inter',fontWeight:500,fontSize:14,color:'#4a4231'}}>

            <button onClick={onDone} style={{flex:1,padding:'14px 20px',borderRadius:14,background:'#262114',

          </div>
        </>)}
      </div>
    </div>
  );
}

                {sh.fics.slice(0,4).map((fid,i)=>(
                  <button key={fid} onClick={()=>onOpenFic(fid)}
                    style={{marginLeft:i===0?0:-10,boxShadow:'0 0 0 2px rgba(255,255,255,.9)',borderRadius:5,zIndex:4-i,position:'relative'}}>
                    <Cover fic={FBY[fid]} size={38} radius={5}/>
                  </button>
                ))}
              </div>
            </div>
          ))}

          <div style={{marginTop:4}}>
            <SHead title="Recently reacted"/>
            {rxns.map(({fic,reaction})=>{
              const f=FBY[fic];
              return (
                <button key={fic} onClick={()=>onOpenFic(fic)} style={{
                  display:'flex',gap:10,padding:'10px 0',borderTop:'.5px solid rgba(38,33,20,.08)',
                  width:'100%',textAlign:'left',alignItems:'center'}}>
                  <Cover fic={f} size={38} radius={5}/>
                  <div style={{flex:1,minWidth:0}}>
                    <div className="sr" style={{fontWeight:600,fontStyle:'italic',fontSize:13,color:'#262114',lineHeight:1.15,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{f.title}</div>
                  </div>
                  <RChip r={reaction} sm/>
                </button>
              );
            })}
          </div>
        </div>
      </div>
    </div>
  );
}

Object.assign(window,{AItem,ScreenHome,ScreenFic,ScreenDiscover,ScreenShelves,ScreenProfile,ScreenUserProfile});
</script>

<script type="text/babel">
// ─────────────────────────────────────────────────────────────
// MODALS: LOG A FIC + REACT SHEET
// ─────────────────────────────────────────────────────────────
const EX_URLS = [
  'https://archiveofourown.org/works/12345678',
  'https://archiveofourown.org/works/98765432',
  'https://archiveofourown.org/works/11111111',
];

function LogSheet({open,onClose}) {
  const [url,setUrl]     = React.useState('');
  const [phase,setPhase] = React.useState('idle');
  const [res,setRes]     = React.useState(null);
  const [shelf,setShelf] = React.useState('tbr');
  
  const reset = ()=>{ setUrl(''); setPhase('idle'); setRes(null); setShelf('tbr'); };
  const close = ()=>{ reset(); onClose(); };
  
  const fetch_ = ()=>{
    if (!url.trim()) return;
    setPhase('loading');
    setTimeout(()=>{
      const m=url.match(/works\/(\d+)/);
      const k=m?m[1]:null;
      const r=k&&AO3_DB[k]?AO3_DB[k]:{exists:false,fic:AO3_DB['98765432'].fic,loggers:0};
      setRes(r); setPhase(r.exists?'exists':'new');
    },1600);
  };
  
  if (!open) return null;
  
  const SO = [
    {id:'tbr',label:'To read',tone:'h'},
    {id:'reading',label:'Reading',tone:'p'},
    {id:'finished',label:'Finished',tone:'sg'},
  ];
  const shelfBg = {h:'#F4D685',p:'#FEB8D4',sg:'#E6E0D1'};
  
  return (
    <div onClick={close} style={{position:'fixed',inset:0,zIndex:200,background:'rgba(23,17,10,.5)',
      display:'flex',alignItems:'center',justifyContent:'center',padding:20}}>
      <div onClick={e=>e.stopPropagation()} style={{
        width:'100%',maxWidth:476,background:'#FDF8EF',borderRadius:22,
        padding:'28px 28px 32px',maxHeight:'92vh',overflowY:'auto',
        boxShadow:'0 24px 80px rgba(0,0,0,.35)'}} className="ns fadein">
        
        {/* ── idle / loading ── */}
        {(phase==='idle'||phase==='loading') && (<>
          <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:6}}>
            <div className="sr" style={{fontStyle:'italic',fontWeight:600,fontSize:22,color:'#262114'}}>Log a fic</div>
            <button onClick={close} style={{width:32,height:32,borderRadius:16,background:'rgba(38,33,20,.08)',
              display:'flex',alignItems:'center',justifyContent:'center',color:'#262114'}}>
              <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.2" strokeLinecap="round"><path d="M6 6l12 12M18 6L6 18"/></svg>
            </button>
          </div>
          <div className="hk" style={{fontSize:13.5,color:'#4a4231',marginBottom:20,lineHeight:1.6}}>
            Paste an AO3 link. Honeyverse pulls the title, author, tags, and word count automatically.
          </div>
          <div style={{display:'flex',gap:8}}>
            <input value={url} onChange={e=>setUrl(e.target.value)}
              onKeyDown={e=>e.key==='Enter'&&fetch_()}
              placeholder="archiveofourown.org/works/\u2026"
              style={{flex:1,padding:'11px 14px',borderRadius:10,
                border:`1.5px solid ${url.trim()?'rgba(38,33,20,.3)':'rgba(38,33,20,.16)'}`,
                fontFamily:'ui-monospace,SFMono-Regular,monospace',fontSize:12.5,color:'#262114',
                outline:'none',background:'rgba(255,255,255,.8)',transition:'border .15s'}}/>
            <button onClick={fetch_} disabled={!url.trim()||phase==='loading'} style={{
              padding:'11px 18px',borderRadius:10,
              background:url.trim()?'#262114':'rgba(38,33,20,.12)',
              color:url.trim()?'#FDF8EF':'rgba(38,33,20,.35)',
              fontFamily:'Inter',fontWeight:600,fontSize:13}}>
              {phase==='loading'?'\u2026':'Fetch'}
            </button>
          </div>
          {phase==='loading' && (
            <div style={{marginTop:14,padding:14,borderRadius:12,background:'rgba(255,255,255,.6)',
              border:'.5px solid rgba(38,33,20,.1)',display:'flex',gap:12,alignItems:'center'}}>
              <div style={{width:20,height:20,borderRadius:10,border:'2.5px solid #262114',
                borderTopColor:'transparent',animation:'spin .7s linear infinite'}}/>
              <span className="hk" style={{fontSize:13,color:'#262114'}}>Fetching from AO3\u2026</span>
            </div>
          )}
          <div className="hk" style={{fontSize:11.5,color:'rgba(38,33,20,.38)',marginTop:16,marginBottom:8}}>Try these examples:</div>
          {EX_URLS.map((ex,i)=>(
            <button key={i} onClick={()=>setUrl(ex)} style={{display:'block',width:'100%',padding:'8px 12px',
              borderRadius:8,textAlign:'left',marginBottom:5,background:'rgba(255,255,255,.55)',
              border:'.5px solid rgba(38,33,20,.1)',fontFamily:'ui-monospace,monospace',fontSize:11.5,color:'#4a4231'}}>
              {ex}
            </button>
          ))}
          <style>{`@keyframes spin{to{transform:rotate(360deg)}}`}</style>
        </>)}
        
        {/* ── exists warning ── */}
        {phase==='exists' && res && (<>
          <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:16}}>
            <div className="sr" style={{fontStyle:'italic',fontWeight:600,fontSize:22,color:'#262114'}}>Already in Honeyverse</div>
            <button onClick={close} style={{width:32,height:32,borderRadius:16,background:'rgba(38,33,20,.08)',display:'flex',alignItems:'center',justifyContent:'center',color:'#262114'}}>
              <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.2" strokeLinecap="round"><path d="M6 6l12 12M18 6L6 18"/></svg>
            </button>
          </div>
          <div style={{padding:'12px 16px',borderRadius:12,background:'rgba(244,214,133,.42)',
            border:'.5px solid rgba(217,178,74,.35)',marginBottom:16,display:'flex',gap:10}}>
            <span style={{fontSize:16,lineHeight:1,marginTop:2}}>\u25c8</span>
            <div>
              <div style={{fontFamily:'Inter',fontWeight:600,fontSize:13,color:'#5a4318'}}>This fic is already in the database</div>
              <div className="hk" style={{fontSize:12.5,color:'#7a5a15',marginTop:2,lineHeight:1.5}}>{res.loggers.toLocaleString()} {res.loggers===1?'person has':'people have'} logged it. You\u2019ll join the same entry \u2014 all reactions stay in one place.</div>
            </div>
          </div>
          <div style={{display:'flex',gap:12,padding:14,borderRadius:12,background:'rgba(255,255,255,.7)',
            border:'.5px solid rgba(38,33,20,.08)',marginBottom:18}}>
            <Cover fic={res.fic} size={64} radius={6}/>
            <div style={{flex:1,minWidth:0}}>
              <div className="sr" style={{fontWeight:600,fontStyle:'italic',fontSize:17,color:'#262114',lineHeight:1.15}}>{res.fic.title}</div>
              <div className="hk" style={{fontSize:12.5,color:'#4a4231',marginTop:4}}>by {res.fic.author} \u00b7 {res.fic.fandom}</div>
              <div style={{display:'flex',gap:5,marginTop:8,flexWrap:'wrap'}}>{res.fic.tags.slice(0,3).map(t=><TagPill key={t}>{t}</TagPill>)}</div>
            </div>
          </div>
          <div className="hk" style={{fontSize:10.5,letterSpacing:'.12em',textTransform:'uppercase',fontWeight:600,color:'rgba(38,33,20,.42)',marginBottom:8}}>Add to shelf</div>
          <div style={{display:'flex',gap:8,marginBottom:20}}>
            {SO.map(s=>(
              <button key={s.id} onClick={()=>setShelf(s.id)} style={{flex:1,padding:'10px 6px',borderRadius:10,
                fontSize:13,fontWeight:600,fontFamily:'Inter',
                background:shelf===s.id?shelfBg[s.tone]:'rgba(255,255,255,.6)',
                border:shelf===s.id?'none':'.5px solid rgba(38,33,20,.14)',color:'#262114'}}>{s.label}</button>
            ))}
          </div>
          <div style={{display:'flex',gap:10}}>
            <button onClick={reset} style={{padding:'12px 18px',borderRadius:10,border:'1px solid rgba(38,33,20,.2)',
              fontFamily:'Inter',fontWeight:500,fontSize:13,color:'#4a4231'}}>Try another</button>
            <button onClick={()=>setPhase('done')} style={{flex:1,padding:'12px 18px',borderRadius:10,
              background:'#262114',color:'#FDF8EF',fontFamily:'Inter',fontWeight:600,fontSize:14}}>Log it \u2192</button>
          </div>
        </>)}
        
        {/* ── new fic ── */}
        {phase==='new' && res && (<>
          <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:16}}>
            <div className="sr" style={{fontStyle:'italic',fontWeight:600,fontSize:22,color:'#262114'}}>New to Honeyverse</div>
            <button onClick={close} style={{width:32,height:32,borderRadius:16,background:'rgba(38,33,20,.08)',display:'flex',alignItems:'center',justifyContent:'center',color:'#262114'}}>
              <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.2" strokeLinecap="round"><path d="M6 6l12 12M18 6L6 18"/></svg>
            </button>
          </div>
          <div style={{padding:'12px 16px',borderRadius:12,background:'rgba(230,224,209,.65)',
            border:'.5px solid rgba(38,33,20,.12)',marginBottom:16,display:'flex',gap:10}}>
            <span style={{fontSize:16,lineHeight:1,marginTop:2}}>\u2736</span>
            <div>
              <div style={{fontFamily:'Inter',fontWeight:600,fontSize:13,color:'#262114'}}>First to log this one</div>
              <div className="hk" style={{fontSize:12.5,color:'#4a4231',marginTop:2,lineHeight:1.5}}>This fic isn\u2019t in the database yet. Logging it creates the shared entry \u2014 others who paste the same link will find yours.</div>
            </div>
          </div>
          <div style={{display:'flex',gap:12,padding:14,borderRadius:12,background:'rgba(255,255,255,.7)',
            border:'.5px solid rgba(38,33,20,.08)',marginBottom:18}}>
            <Cover fic={res.fic} size={64} radius={6}/>
            <div style={{flex:1,minWidth:0}}>
              <div className="sr" style={{fontWeight:600,fontStyle:'italic',fontSize:17,color:'#262114',lineHeight:1.15}}>{res.fic.title}</div>
              <div className="hk" style={{fontSize:12.5,color:'#4a4231',marginTop:4}}>by {res.fic.author} \u00b7 {res.fic.fandom}</div>
              <div style={{display:'flex',gap:5,marginTop:8,flexWrap:'wrap'}}>{res.fic.tags.slice(0,3).map(t=><TagPill key={t}>{t}</TagPill>)}</div>
            </div>
          </div>
          <div className="hk" style={{fontSize:10.5,letterSpacing:'.12em',textTransform:'uppercase',fontWeight:600,color:'rgba(38,33,20,.42)',marginBottom:8}}>Add to shelf</div>
          <div style={{display:'flex',gap:8,marginBottom:20}}>
            {SO.map(s=>(
              <button key={s.id} onClick={()=>setShelf(s.id)} style={{flex:1,padding:'10px 6px',borderRadius:10,
                fontSize:13,fontWeight:600,fontFamily:'Inter',
                background:shelf===s.id?shelfBg[s.tone]:'rgba(255,255,255,.6)',
                border:shelf===s.id?'none':'.5px solid rgba(38,33,20,.14)',color:'#262114'}}>{s.label}</button>
            ))}
          </div>
          <button onClick={()=>setPhase('done')} style={{width:'100%',padding:'13px 20px',borderRadius:10,
            background:'#262114',color:'#FDF8EF',fontFamily:'Inter',fontWeight:600,fontSize:14}}>
            Add to {SO.find(s=>s.id===shelf)?.label} \u2192
          </button>
        </>)}
        
        {/* ── logged! ── */}
        {phase==='done' && res && (<>
          <div style={{textAlign:'center',padding:'14px 0 8px'}}>
            <div style={{fontSize:38,marginBottom:12}}>\u2736</div>
            <div className="sr" style={{fontStyle:'italic',fontWeight:600,fontSize:26,color:'#262114'}}>Logged.</div>
            <div className="hk" style={{fontSize:13.5,color:'#4a4231',marginTop:10,lineHeight:1.6}}>
              <em className="sr" style={{fontStyle:'italic',color:'#262114'}}>{res.fic.title}</em> is on your {SO.find(s=>s.id===shelf)?.label.toLowerCase()} shelf. React whenever you\u2019re ready.
            </div>
            <div style={{display:'flex',justifyContent:'center',marginTop:20}}>
              <Cover fic={res.fic} size={88} radius={8}/>
            </div>
          </div>
          <button onClick={close} style={{width:'100%',marginTop:24,padding:'13px 20px',borderRadius:10,
            background:'#262114',color:'#FDF8EF',fontFamily:'Inter',fontWeight:600,fontSize:14}}>Done</button>
        </>)}
      </div>
    </div>
  );
}

function ReactSheet({open,onClose,picked,onPick}) {
  if (!open) return null;
  return (
    <div onClick={onClose} style={{position:'fixed',inset:0,zIndex:200,background:'rgba(23,17,10,.5)',
      display:'flex',alignItems:'center',justifyContent:'center',padding:20}}>
      <div onClick={e=>e.stopPropagation()} style={{width:'100%',maxWidth:460,background:'#FDF8EF',borderRadius:22,
        padding:'28px 28px 32px',boxShadow:'0 24px 80px rgba(0,0,0,.35)'}} className="fadein">
        <div className="sr" style={{fontStyle:'italic',fontWeight:600,fontSize:24,color:'#262114',marginBottom:6}}>How did it feel?</div>
        <div className="hk" style={{fontSize:13.5,color:'#4a4231',marginBottom:20,lineHeight:1.55}}>Pick any that fit. Your reaction is visible to the author and your followers.</div>
        <div style={{display:'flex',flexWrap:'wrap',gap:8}}>
          {REACTIONS.map(r=>{
            const on=picked.includes(r.id);
            const hb={pink:'#FEB8D4',honey:'#F4D685',sage:'#E6E0D1'}[r.hue];
            return (
              <button key={r.id} onClick={()=>onPick(r.id)} style={{display:'flex',alignItems:'center',gap:8,
                padding:'10px 16px',borderRadius:100,
                border:on?'1.5px solid #262114':'1px solid rgba(38,33,20,.14)',
                background:on?hb:'rgba(255,255,255,.7)',
                fontFamily:'Inter',fontWeight:on?600:500,fontSize:14,color:'#262114'}}>
                <span>{r.glyph}</span>{r.label}
              </button>
            );
          })}
        </div>
        <button onClick={onClose} style={{width:'100%',marginTop:22,padding:'13px 20px',borderRadius:10,
          background:'#262114',color:'#FDF8EF',fontFamily:'Inter',fontWeight:600,fontSize:14}}>
          {picked.length?`Post ${picked.length} reaction${picked.length>1?'s':''}`:'Done'}
        </button>
      </div>
    </div>
  );
}

Object.assign(window,{LogSheet,ReactSheet});
</script>

<script type="text/babel">
// ─────────────────────────────────────────────────────────────
// ROOT APP
// ─────────────────────────────────────────────────────────────
const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{"startScreen":"login"}/*EDITMODE-END*/;

function App() {
  const [auth,setAuth]   = React.useState(()=>localStorage.getItem('hva')||TWEAK_DEFAULTS.startScreen);
  const [tab,setTab]     = React.useState(()=>localStorage.getItem('hvt')||'home');
  const [fic,setFic]     = React.useState(null);
  const [user,setUser]   = React.useState(null);
  const [log,setLog]     = React.useState(false);
  const [react,setReact] = React.useState(false);
  const [picked,setPicked]= React.useState([]);
  const [editMode,setEM] = React.useState(false);

  React.useEffect(()=>localStorage.setItem('hva',auth),[auth]);
  React.useEffect(()=>localStorage.setItem('hvt',tab),[tab]);

  React.useEffect(()=>{
    const h=(e)=>{
      if(e.data?.type==='__activate_edit_mode') setEM(true);
      else if(e.data?.type==='__deactivate_edit_mode') setEM(false);
    };
    window.addEventListener('message',h);
    window.parent.postMessage({type:'__edit_mode_available'},'*');
    return()=>window.removeEventListener('message',h);
  },[]);

  if (auth==='login') return <LoginScreen onDone={()=>setAuth('setup')}/>;
  if (auth==='setup') return <SetupScreen onDone={()=>setAuth('app')}/>;

  const openFic  = id=>{ setFic(id); setUser(null); };
  const openUser = id=>{ setUser(id); setFic(null); };
  const back     = ()=>{ setFic(null); setUser(null); };
  const nav      = t=>{ setTab(t); setFic(null); setUser(null); };

  let body;
  if (user)                 body = <ScreenUserProfile uid={user} onBack={back} onOpenFic={openFic}/>;
  else if (fic)             body = <ScreenFic ficId={fic} onBack={back} onReact={()=>{setReact(true);setPicked([]);}}/>;
  else if(tab==='home')     body = <ScreenHome onOpen={openFic} onOpenUser={openUser}/>;
  else if(tab==='discover') body = <ScreenDiscover onOpen={openFic}/>;
  else if(tab==='shelves')  body = <ScreenShelves onOpen={openFic}/>;
  else if(tab==='profile')  body = <ScreenProfile onOpen={openFic}/>;

  return (
    <div className="app-shell">
      <Sidebar active={tab} onNav={nav} onLog={()=>setLog(true)}/>
      <main className="main ns">
        <MobTop
          title={user ? USERS[user]?.name : fic ? FBY[fic]?.title : null}
          onBack={fic||user ? back : null}
          onLog={()=>setLog(true)}
        />
        {body}
        <MobTabs active={tab} onNav={nav}/>
      </main>
      <LogSheet open={log} onClose={()=>setLog(false)}/>
      <ReactSheet open={react} onClose={()=>setReact(false)} picked={picked}
        onPick={id=>setPicked(p=>p.includes(id)?p.filter(x=>x!==id):[...p,id])}/>

      {/* Tweaks panel */}
      {editMode && (
        <div style={{position:'fixed',bottom:20,right:20,zIndex:300,
          padding:'16px 18px',borderRadius:16,background:'#FDF8EF',
          boxShadow:'0 20px 60px rgba(0,0,0,.3)',width:256,fontFamily:'Inter',fontSize:13,color:'#262114'}}>
          <div className="sr" style={{fontStyle:'italic',fontWeight:600,fontSize:18,marginBottom:14}}>Tweaks</div>
          <div style={{fontSize:10.5,textTransform:'uppercase',letterSpacing:'.12em',fontWeight:600,color:'rgba(38,33,20,.5)',marginBottom:8}}>Auth flow</div>
          <div style={{display:'flex',gap:6,flexWrap:'wrap',marginBottom:14}}>
            {[['login','Login'],['setup','Setup'],['app','Skip to app']].map(([k,l])=>(
              <button key={k} onClick={()=>{localStorage.setItem('hva',k);setAuth(k);}} style={{
                padding:'7px 12px',borderRadius:9,fontSize:12.5,fontWeight:500,
                background:auth===k?'#262114':'rgba(38,33,20,.08)',
                color:auth===k?'#FDF8EF':'#262114'}}>
                {l}
              </button>
            ))}
          </div>
          <div style={{fontSize:10.5,textTransform:'uppercase',letterSpacing:'.12em',fontWeight:600,color:'rgba(38,33,20,.5)',marginBottom:8}}>Start on</div>
          <div style={{display:'flex',gap:6,flexWrap:'wrap'}}>
            {['home','discover','shelves','profile'].map(k=>(
              <button key={k} onClick={()=>nav(k)} style={{
                padding:'7px 12px',borderRadius:9,fontSize:12.5,fontWeight:500,textTransform:'capitalize',
                background:tab===k&&!fic?'#262114':'rgba(38,33,20,.08)',
                color:tab===k&&!fic?'#FDF8EF':'#262114'}}>
                {k}
              </button>
            ))}
          </div>
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
